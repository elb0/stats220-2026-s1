<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liza Bolton | Statistics & Data Science Educator</title>
    <style>
        /* CSS Reset and Basic Styles */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #fff;
        }

        /* Container for centering content */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 20px 0;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #555;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: #000;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px 0;
            flex-wrap: wrap;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
        }

        .hero-text h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: #666;
            max-width: 500px;
        }

        .hero-image {
            flex: 0 0 300px;
            text-align: right;
        }

        .hero-image img {
            width: 100%;
            border-radius: 50%; /* Making it circular like her profile style */
            max-width: 250px;
            filter: grayscale(20%);
        }

        /* Social Links */
        .social-links {
            margin-top: 30px;
        }

        .social-links a {
            margin-right: 15px;
            text-decoration: none;
            font-size: 1.5rem;
            color: #444;
        }

        /* Footer */
        footer {
            margin-top: 100px;
            padding: 40px 0;
            border-top: 1px solid #eee;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
            }
            .hero-text p {
                margin: 0 auto;
            }
            .hero-image {
                margin-bottom: 30px;
                text-align: center;
            }
            nav {
                justify-content: center;
            }
        }
    </style>
</head>
